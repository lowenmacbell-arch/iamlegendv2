services:
  - type: web
    name: iamlegend
    runtime: docker
    dockerfilePath: lib/Dockerfile
    envVars:
      - key: SESSION_ID
        value: ""
      - key: OWNER_NUMBER
        value: "255618558502"
      - key: BOT_NAME
        value: "ᴵ ᴬᴹ ᴸᴱᴳᴱᴺᴰ"
      - key: COMMAND_MODE
        value: "public"
      - key: TIMEZONE
        value: "Africa/Nairobi"
      - key: MONGO_URL
        value: ""
      - key: POSTGRES_URL
        value: ""
      - key: MYSQL_URL
        value: ""
      - key: DB_URL
        value: ""
    startCommand: npm run start:optimized